<h1>Supprimer un auteur</h1>
{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'ludotheque/style.css' %}">
</head>
<p>
    Veux-tu vraiment supprimer l’auteur :
    <strong>{{ auteur.prenom }} {{ auteur.nom }}</strong> ?
</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Oui, supprimer
    </button>

</form>

<br>

<a href="{% url 'liste_auteurs' %}">
    Annuler
</a>
