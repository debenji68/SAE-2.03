<h1>Supprimer un jeu</h1>
{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'ludotheque/style.css' %}">
</head>
<p>
    Veux-tu vraiment supprimer le jeu :
    <strong>{{ jeu.titre }}</strong> ?
</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Oui, supprimer
    </button>

</form>

<br>

<a href="{% url 'liste_jeux' %}">
    Annuler
</a>
