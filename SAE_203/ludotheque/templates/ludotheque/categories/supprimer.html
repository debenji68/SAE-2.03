<h1>Supprimer une catégorie</h1>
{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'ludotheque/style.css' %}">
</head>
<p>
    Veux-tu vraiment supprimer la catégorie :
    <strong>{{ categorie.nom }}</strong> ?
</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Oui, supprimer
    </button>

</form>

<br>

<a href="{% url 'liste_categories' %}">
    Annuler
</a>
