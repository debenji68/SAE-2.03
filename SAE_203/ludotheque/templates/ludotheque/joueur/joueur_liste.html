<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Liste des Joueurs</title>
</head>
<body>
    <h1>Liste des Joueurs</h1>
    <a href="{% url 'joueur_creer' %}">[+] Ajouter un nouveau joueur</a>
    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Pseudo</th>
                <th>Prénom</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for j in joueurs %}
            <tr>
                <td>{{ j.username }}</td>
                <td>{{ j.first_name }}</td>
                <td>{{ j.last_name }}</td>
                <td>{{ j.email }}</td>
                <td>{{ j.get_type_joueur_display }}</td>
                <td>
                    <a href="{% url 'ma_liste_jeux' j.id %}"> Ma Liste</a> |
                    <a href="{% url 'joueur_modifier' j.id %}"> Modifier</a> |
                    <a href="{% url 'joueur_supprimer' j.id %}"> Supprimer</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="6">Aucun joueur enregistré.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
