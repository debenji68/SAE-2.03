<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Confirmer Suppression</title>
</head>
<body>
    <h1>Supprimer le profil ?</h1>
    <p>Êtes-vous sûr de vouloir supprimer le compte de <strong>{{ joueur.username }}</strong> ?</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Oui, supprimer définitivement</button>
        <a href="{% url 'joueur_liste' %}">Annuler</a>
    </form>
</body>
</html>
